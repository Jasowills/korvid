<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Korvid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #050507;
        --surface: #0D0F12;
        --surface-2: #14171C;
        --border: #1E2127;
        --white: #FFFFFF;
        --text: #FFFFFF;
        --text-secondary: #9CA0A6;
        --text-muted: #5A5E64;
        --sheen: #7C8CFF;
        --sheen-glow: rgba(124,140,255,0.35);
        --glass: rgba(13,15,18,0.6);
        --glass-border: rgba(255,255,255,0.06);
        --font-display: 'Space Grotesk', system-ui, sans-serif;
        --font-body: 'Space Grotesk', system-ui, sans-serif;
        --font-mono: 'IBM Plex Mono', 'Menlo', monospace;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body { background: var(--bg); color: var(--white); font-family: var(--font-body); }
      :focus-visible { outline: 2px solid var(--sheen); outline-offset: 2px; }

      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes sheenPulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
      @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
      @keyframes fadeInScale { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
      @keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
      @keyframes orbGlow {
        0%,100% { box-shadow: 0 0 60px rgba(124,140,255,0.08), 0 0 120px rgba(124,140,255,0.04); }
        50% { box-shadow: 0 0 80px rgba(124,140,255,0.12), 0 0 160px rgba(124,140,255,0.06); }
      }
      @keyframes orbGlowActive {
        0%,100% { box-shadow: 0 0 80px rgba(124,140,255,0.2), 0 0 160px rgba(124,140,255,0.1), 0 0 240px rgba(124,140,255,0.05); }
        50% { box-shadow: 0 0 120px rgba(124,140,255,0.3), 0 0 200px rgba(124,140,255,0.15), 0 0 300px rgba(124,140,255,0.08); }
      }
      @keyframes orbRing {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes orbRingReverse {
        0% { transform: rotate(360deg); }
        100% { transform: rotate(0deg); }
      }
      @keyframes float {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }
      @keyframes floatSlow {
        0%,100% { transform: translateY(0px) translateX(0px); }
        33% { transform: translateY(-4px) translateX(2px); }
        66% { transform: translateY(2px) translateX(-3px); }
      }
      @keyframes particleDrift {
        0% { transform: translateY(0) translateX(0); opacity: 0; }
        10% { opacity: 0.6; }
        90% { opacity: 0.6; }
        100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
      }
      @keyframes statusPulse {
        0%,100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.5); opacity: 0.5; }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes gentleSway {
        0%,100% { transform: translateX(0); }
        50% { transform: translateX(4px); }
      }
      @keyframes glowPulse {
        0%,100% { opacity: 0.3; }
        50% { opacity: 0.7; }
      }
      @keyframes textGlow {
        0%,100% { text-shadow: 0 0 20px rgba(124,140,255,0.3); }
        50% { text-shadow: 0 0 40px rgba(124,140,255,0.5), 0 0 80px rgba(124,140,255,0.2); }
      }

      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
